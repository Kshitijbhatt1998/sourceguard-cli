name: SourceGuard Secret Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install sourceguard
      - run: sourceguard scan . --severity HIGH # Exits 1 if any HIGH or CRITICAL secrets found → blocks merge
